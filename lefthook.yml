pre-commit:
  parallel: true
  commands:
    inline-styles:
      run: pnpm check:inline-styles --staged
    format:
      glob: '*.{ts,tsx,cts,mts,js,jsx,cjs,mjs,json,jsonc,css}'
      stage_fixed: true
      run: pnpm exec biome format --write --no-errors-on-unmatched {staged_files}
    # knip:
    #   glob: '*.{ts,tsx,cts,mts,js,jsx,cjs,mjs,mdx,json,jsonc}'
    #   run: pnpm knip
    typecheck:
      run: pnpm typecheck
