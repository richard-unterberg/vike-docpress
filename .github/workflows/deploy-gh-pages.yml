name: Deploy Page

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Engine Tests
        run: cd packages/engine && pnpm test

      - name: Build Page
        run: pnpm --filter ./packages/consumer-dev build

      - name: Upload GitHub Pages Artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./packages/consumer-dev/dist/client

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Bunny Pull Zone Cache
        if: github.ref == 'refs/heads/master'
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
        run: pnpm purge:bunny

      - name: Sleep to Ensure Cache Purge Propagates
        if: github.ref == 'refs/heads/master'
        run: sleep 10

      - name: Warm Bunny Cache from Sitemap
        if: github.ref == 'refs/heads/master'
        env:
          SITE_URL: https://nivel-docs.de
          CACHE_WARM_CONCURRENCY: 4
        run: pnpm warm:cache
